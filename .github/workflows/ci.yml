name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
    - '*'

jobs:
  test:
    name: ${{ matrix.config.kind }} ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        config:
          - os: macOS-latest
            kind: test
          - os: windows-latest
            kind: test
          - os: ubuntu-latest
            kind: test

    steps:
      - name: Setup repo
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Verify formatting
        if: startsWith(matrix.config.os, 'ubuntu')
        run: deno fmt --check

      - name: Run linter
        if: startsWith(matrix.config.os, 'ubuntu')
        run: deno lint

      - name: Run tests (Deno)
        run: deno test -A

      - name: Run tests (Node.js)
        run: node --test mod.test.ts

      - name: Publish to JSR on tag
        if: startsWith(matrix.config.os, 'ubuntu')
        run: deno run -A jsr:@david/publish-on-tag@0.2.0
